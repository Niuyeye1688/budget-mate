<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经费审批与记账助手</title>
  <link rel="stylesheet" href="static/style.css">
  <meta name="theme-color" content="#2c3e50">
  <style>
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #fff; border-radius: 12px;
      width: 90%; max-width: 320px; padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      transform: scale(0.95); transition: transform 0.2s ease;
    }
    .modal-overlay.active .modal-box { transform: scale(1); }
    .modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; color: #2c3e50; }
    .modal-body { font-size: 0.95rem; color: #555; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .modal-btn {
      padding: 8px 18px; border-radius: 6px; border: none;
      font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
    }
    .modal-btn-primary { background: #2980b9; color: #fff; }
    .modal-btn-primary:active { background: #1f6691; }
    .modal-btn-secondary { background: #e0e0e0; color: #333; }
    .modal-btn-secondary:active { background: #c0c0c0; }
  </style>
</head>
<body>
  <div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">提示</div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-secondary" id="modal-cancel">取消</button>
        <button class="modal-btn modal-btn-primary" id="modal-ok">确定</button>
      </div>
    </div>
  </div>
  <div class="container">
    <header>
      <h1>经费审批与记账助手</h1>
    </header>

    <nav>
      <button class="active" onclick="showTab('dashboard')">仪表盘</button>
      <button onclick="showTab('approve')">审批/记账</button>
      <button onclick="showTab('records')">记录</button>
      <button onclick="showTab('approvals')">审批记录</button>
      <button onclick="showTab('trip')">行程</button>
      <button onclick="showTab('bills')">账单</button>
      <button onclick="showTab('settings')">设置</button>
    </nav>

    <!-- 仪表盘 -->
    <div id="dashboard" class="section active">
      <h2>本月概览</h2>
      <div class="card-grid">
        <div class="card">
          <div class="label">本月预算</div>
          <div class="value" id="dash-budget">0.00</div>
        </div>
        <div class="card">
          <div class="label">本月已用</div>
          <div class="value" id="dash-spent">0.00</div>
        </div>
        <div class="card">
          <div class="label">本月剩余</div>
          <div class="value" id="dash-remaining">0.00</div>
        </div>
      </div>
      <div id="meal-suggestion" style="margin-bottom:20px;display:none;"></div>

      <h3>今日预算分配</h3>
      <div class="card-grid" id="daily-allocation" style="margin-bottom:20px;"></div>

      <h3>分类预算使用情况</h3>
      <div id="category-bars"></div>
    </div>

    <!-- 审批/记账 -->
    <div id="approve" class="section">
      <h2>提交支出审批</h2>
      <div id="approve-meal-tip" style="margin-bottom:16px;display:none;padding:10px 14px;background:#e8f4fd;border-radius:6px;color:#2980b9;font-size:0.95rem;"></div>
      <form id="approve-form" onsubmit="submitBatchApproval(event)">
        <div id="batch-items">
          <div class="batch-row" data-index="0">
            <div class="form-group">
              <label>金额（元）</label>
              <input type="number" class="batch-amount" step="0.01" required placeholder="例如：15">
            </div>
            <div class="form-group">
              <label>用途描述</label>
              <input type="text" class="batch-desc" required placeholder="例如：午饭">
            </div>
            <div class="batch-remove-placeholder"></div>
          </div>
        </div>
        <div class="batch-actions">
          <button type="submit" class="btn btn-primary">提交审批</button>
        </div>
      </form>
      <div id="approve-result" class="result-box"></div>
    </div>

    <!-- 记录 -->
    <div id="records" class="section">
      <h2>支出记录</h2>
      <button class="btn btn-danger" onclick="clearRecords()" style="margin-bottom:15px;background:#e74c3c;color:white;">清空所有记录</button>
      <div id="records-table"></div>
    </div>

    <!-- 审批记录 -->
    <div id="approvals" class="section">
      <h2>审批记录</h2>
      <div id="approvals-table"></div>
    </div>

    <!-- 账单 -->
    <div id="bills" class="section">
      <h2>账单</h2>
      <button class="btn btn-primary" onclick="loadDailyBill()" style="margin-right:10px;margin-bottom:15px;">生成今日账单</button>
      <button class="btn btn-primary" onclick="loadWeeklyBill()" style="margin-bottom:15px;">生成本周账单</button>
      <div id="bill-content" class="bill-text"></div>
    </div>

    <!-- 行程审批 -->
    <div id="trip" class="section">
      <h2>行程审批</h2>
      <p style="color:#7f8c8d;font-size:0.9rem;margin-bottom:12px;">规划一次外出/旅行的全部开支，统一审批。</p>
      <form id="trip-form" onsubmit="submitTripApproval(event)">
        <div id="trip-items">
          <div class="trip-row" data-index="0">
            <div class="form-group">
              <label>分类</label>
              <select class="trip-category" required>
                <option value="餐饮">餐饮</option>
                <option value="交通">交通</option>
                <option value="购物">购物</option>
                <option value="娱乐">娱乐</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label>金额（元）</label>
              <input type="number" class="trip-amount" step="0.01" required placeholder="例如：50" oninput="updateTripTotal()">
            </div>
            <div class="form-group">
              <label>用途描述</label>
              <input type="text" class="trip-desc" required placeholder="例如：地铁">
            </div>
            <div class="batch-remove-placeholder"></div>
          </div>
        </div>
        <div class="batch-actions">
          <button type="button" class="btn btn-secondary" onclick="addTripRow()">+ 添加一项</button>
          <button type="submit" class="btn btn-primary">提交行程审批</button>
        </div>
        <div id="trip-total" style="margin-top:12px;font-size:1.1rem;font-weight:600;color:#2c3e50;">合计：0.00 元</div>
      </form>
      <div id="trip-result" class="result-box"></div>
    </div>

    <!-- 设置 -->
    <div id="settings" class="section">
      <h2>预算设置</h2>
      <form onsubmit="setBudget(event)">
        <div class="config-grid">
          <div class="form-group">
            <label>每月总预算（元）</label>
            <input type="number" id="set-budget-amount" step="0.01" required>
          </div>
          <div></div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button type="submit" class="btn btn-success">保存</button>
          </div>
        </div>
      </form>

      <h3>分类预算上限</h3>
      <form onsubmit="setLimit(event)">
        <div class="config-grid">
          <div class="form-group">
            <label>分类</label>
            <select id="limit-category">
              <option value="餐饮">餐饮</option>
              <option value="交通">交通</option>
              <option value="购物">购物</option>
              <option value="娱乐">娱乐</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>上限金额（元）</label>
            <input type="number" id="limit-amount" step="0.01" required>
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button type="submit" class="btn btn-success">设置</button>
          </div>
        </div>
      </form>

      <h3>AI 审批配置</h3>
      <form onsubmit="saveConfig(event)">
        <div class="form-group" style="margin-bottom:12px;">
          <label>
            <input type="checkbox" id="ai-enabled"> 启用 AI 智能审批（替代规则判断）
          </label>
        </div>
        <div class="config-grid">
          <div class="form-group">
            <label>模型</label>
            <select id="ai-model">
              <option value="deepseek-v4-pro">DeepSeek V4 Pro (推荐)</option>
              <option value="deepseek-v4-flash">DeepSeek V4 Flash (更快更便宜)</option>
              <option value="qwen-turbo">通义千问</option>
              <option value="glm-4">智谱 GLM</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="ai-api-key" placeholder="输入你的 API Key">
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button type="submit" class="btn btn-success">保存</button>
          </div>
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label>API 地址（一般不用改）</label>
          <input type="text" id="ai-base-url" value="https://api.deepseek.com/v1">
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label>饮食偏好 / 忌口</label>
          <input type="text" id="ai-dietary" placeholder="例如：不吃鱼、不吃辣、素食" onblur="autoSaveDietary()">
          <span id="dietary-save-hint" style="color:#27ae60;font-size:0.8rem;margin-left:8px;opacity:0;transition:opacity 0.3s;"></span>
        </div>
        <p style="color:#7f8c8d;font-size:0.85rem;margin-top:8px;">
          提示：默认使用 DeepSeek API，需前往 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 注册获取 Key。也可选择通义千问、智谱 GLM 等兼容 OpenAI 格式的 API。
        </p>
      </form>

      <h3>数据同步</h3>
      <div style="margin-bottom:20px;">
        <button class="btn btn-primary" onclick="exportDataFile()" style="margin-right:10px;">导出数据</button>
        <label class="btn btn-success" style="display:inline-block;position:relative;cursor:pointer;">
          导入数据
          <input type="file" id="import-file" accept=".json" style="position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer;" onchange="importDataFile(event)">
        </label>
      </div>
      <div id="app-version" style="margin-top:24px;text-align:center;color:#999;font-size:0.8rem;"></div>
    </div>
  </div>

  <script src="static/custom-select.js"></script>
  <script src="static/db.js"></script>
  <script src="static/app-logic.js"></script>
  <script>
    const APP_VERSION = '1.3.9';
    let backendChecked = false;
    let useBackend = false;

    function showAlert(msg, title = '提示') {
      return new Promise(resolve => {
        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-body').textContent = msg;
        document.getElementById('modal-cancel').style.display = 'none';
        const okBtn = document.getElementById('modal-ok');
        okBtn.onclick = () => { modal.classList.remove('active'); resolve(); };
        modal.classList.add('active');
      });
    }

    function showConfirm(msg, title = '确认') {
      return new Promise(resolve => {
        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-body').textContent = msg;
        document.getElementById('modal-cancel').style.display = '';
        const okBtn = document.getElementById('modal-ok');
        const cancelBtn = document.getElementById('modal-cancel');
        okBtn.onclick = () => { modal.classList.remove('active'); resolve(true); };
        cancelBtn.onclick = () => { modal.classList.remove('active'); resolve(false); };
        modal.classList.add('active');
      });
    }

    async function detectBackend() {
      if (backendChecked) return;
      await checkMonthlyReset();
      backendChecked = true;
    }

    async function api(url, opts) {
      await detectBackend();
      console.log('[api] url =', url, 'useBackend =', useBackend);
      if (useBackend) {
        try {
          const res = await fetch(url, opts);
          if (!res.ok) throw new Error('Backend returned ' + res.status);
          const data = await res.json();
          console.log('[api] backend response:', data);
          return data;
        } catch (e) {
          console.log('[api] backend error:', e.message);
          useBackend = false;
          backendChecked = false;
        }
      }
      // Frontend fallback
      if (url === '/api/budget' && !opts) return await getBudgetData();
      if (url === '/api/budget' && opts?.method === 'POST') {
        const body = JSON.parse(opts.body);
        await setMonthlyBudget(body.amount);
        return { success: true, monthly_budget: body.amount };
      }
      if (url === '/api/limits' && opts?.method === 'POST') {
        const body = JSON.parse(opts.body);
        await setCategoryLimit(body.category, body.amount);
        return { success: true, category: body.category, limit: body.amount };
      }
      if (url === '/api/records' && !opts) return { records: (await getAllRecords()).reverse() };
      if (url === '/api/records' && opts?.method === 'DELETE') {
        await clearAllRecords();
        return { success: true };
      }
      const recordDeleteMatch = url.match(/^\/api\/records\/(\d+)$/);
      if (recordDeleteMatch && opts?.method === 'DELETE') {
        await deleteRecord(parseInt(recordDeleteMatch[1]));
        return { success: true };
      }
      if (url === '/api/approve' && opts?.method === 'POST') {
        const body = JSON.parse(opts.body);
        const result = await judgeExpense(body.amount, body.description);
        await addRecord(body.amount, body.description, result.category, result.approved, result.reason);
        return result;
      }
      if (url === '/api/approve/batch' && opts?.method === 'POST') {
        const body = JSON.parse(opts.body);
        const result = await judgeBatchExpense(body.items);
        const reason = result.reason || '';
        for (const item of result.items) {
          await addRecord(item.amount, item.description, item.category, result.approved, reason);
        }
        return result;
      }
      if (url === '/api/bill/daily') return { bill: await generateDailyBill() };
      if (url === '/api/bill/weekly') return { bill: await generateWeeklyBill() };
      if (url === '/api/meal-suggestion') return await getMealSuggestion();
      if (url === '/api/config' && !opts) {
        const cfg = await getConfig('api_config', {});
        return {
          enabled: cfg.enabled || false,
          base_url: cfg.base_url || 'https://api.deepseek.com',
          model: cfg.model || 'deepseek-v4-pro',
          has_key: !!cfg.api_key,
          dietary_preferences: cfg.dietary_preferences || '',
        };
      }
      if (url === '/api/config' && opts?.method === 'POST') {
        const body = JSON.parse(opts.body);
        const cfg = await getConfig('api_config', {});
        if ('enabled' in body) cfg.enabled = body.enabled;
        if ('api_key' in body) cfg.api_key = body.api_key;
        if ('base_url' in body) cfg.base_url = body.base_url;
        if ('model' in body) cfg.model = body.model;
        if ('dietary_preferences' in body) cfg.dietary_preferences = body.dietary_preferences;
        await setConfig('api_config', cfg);
        return { success: true };
      }
      return {};
    }

    function showTab(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
      if (id === 'dashboard') { loadDashboard(); loadMealSuggestion(); }
      if (id === 'records') loadRecords();
      if (id === 'approvals') loadApprovals();
      if (id === 'approve') loadMealSuggestion();
      if (id === 'trip') updateTripTotal();
    }

    function addTripRow() {
      const container = document.getElementById('trip-items');
      const idx = container.children.length;
      const row = document.createElement('div');
      row.className = 'trip-row';
      row.dataset.index = idx;
      row.innerHTML = `
        <div class="form-group">
          <label>分类</label>
          <select class="trip-category" required>
            <option value="餐饮">餐饮</option>
            <option value="交通">交通</option>
            <option value="购物">购物</option>
            <option value="娱乐">娱乐</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>金额（元）</label>
          <input type="number" class="trip-amount" step="0.01" required placeholder="例如：50" oninput="updateTripTotal()">
        </div>
        <div class="form-group">
          <label>用途描述</label>
          <input type="text" class="trip-desc" required placeholder="例如：地铁">
        </div>
        <button type="button" class="btn btn-remove" onclick="removeTripRow(this)" title="删除">-</button>
      `;
      container.appendChild(row);
      initCustomSelects(row);
      updateTripTotal();
    }

    async function removeTripRow(btn) {
      const container = document.getElementById('trip-items');
      if (container.children.length <= 1) {
        await showAlert('至少保留一项');
        return;
      }
      btn.parentElement.remove();
      updateTripTotal();
    }

    function updateTripTotal() {
      const rows = document.querySelectorAll('.trip-row');
      let total = 0;
      rows.forEach(row => {
        const amount = parseFloat(row.querySelector('.trip-amount').value);
        if (!isNaN(amount)) total += amount;
      });
      document.getElementById('trip-total').textContent = '合计：' + total.toFixed(2) + ' 元';
    }

    async function submitTripApproval(e) {
      e.preventDefault();
      const rows = document.querySelectorAll('.trip-row');
      const items = [];
      rows.forEach(row => {
        const amount = parseFloat(row.querySelector('.trip-amount').value);
        const desc = row.querySelector('.trip-desc').value;
        const cat = row.querySelector('.trip-category').value;
        if (!isNaN(amount) && desc.trim()) {
          items.push({ amount, description: desc.trim(), category: cat });
        }
      });

      if (items.length === 0) {
        await showAlert('请至少填写一项支出');
        return;
      }

      const result = await api('/api/approve/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items })
      });

      const box = document.getElementById('trip-result');
      box.className = 'result-box show ' + (result.approved ? 'approved' : 'rejected');

      let itemsHtml = '';
      if (result.items && result.items.length > 0) {
        itemsHtml = '<br><br>明细：<br>' + result.items.map(i =>
          '&nbsp;&nbsp;' + i.description + ' ' + i.amount.toFixed(2) + '元 [' + i.category + ']'
        ).join('<br>');
      }

      const displayTotal = result.total ? result.total.toFixed(2) : items.reduce((s, i) => s + i.amount, 0).toFixed(2);
      box.innerHTML = '<strong>' + (result.approved ? '批准' : '拒绝') + '</strong>（本次行程合计 ' + displayTotal + ' 元）<br>理由：' + result.reason + itemsHtml;

      document.getElementById('trip-items').innerHTML = `
        <div class="trip-row" data-index="0">
          <div class="form-group">
            <label>分类</label>
            <select class="trip-category" required>
              <option value="餐饮">餐饮</option>
              <option value="交通">交通</option>
              <option value="购物">购物</option>
              <option value="娱乐">娱乐</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>金额（元）</label>
            <input type="number" class="trip-amount" step="0.01" required placeholder="例如：50" oninput="updateTripTotal()">
          </div>
          <div class="form-group">
            <label>用途描述</label>
            <input type="text" class="trip-desc" required placeholder="例如：地铁">
          </div>
          <div class="batch-remove-placeholder"></div>
        </div>
      `;
      initCustomSelects(document.getElementById('trip-items'));
      updateTripTotal();
    }

    async function loadMealSuggestion() {
      try {
        const data = await api('/api/meal-suggestion');
        const dash = document.getElementById('meal-suggestion');
        const tip = document.getElementById('approve-meal-tip');
        if (data.meal) {
          let recsHtml = '';
          if (data.recommendations && data.recommendations.length > 0) {
            recsHtml = '<div style="margin-top:10px;"><strong>推荐：</strong>' +
              data.recommendations.map(r =>
                `<span style="display:inline-block;margin:4px 8px 4px 0;padding:4px 10px;background:#d4edda;border-radius:12px;color:#155724;font-size:0.85rem;">${r.name} ~${r.price}元</span>`
              ).join('') +
              '</div>';
          }
          const html = `
            <div style="padding:14px 16px;background:#e8f4fd;border-radius:8px;color:#2980b9;font-size:0.95rem;">
              <strong>${data.meal}建议</strong>：建议控制在 <strong>${data.suggestion.toFixed(2)}</strong> 元内
              <span style="color:#7f8c8d;font-size:0.85rem;">（日均 ${data.daily_budget.toFixed(2)} 元，今天餐饮已用 ${data.daily_spent.toFixed(2)} 元）</span>
              ${recsHtml}
            </div>
          `;
          if (dash) { dash.innerHTML = html; dash.style.display = 'block'; }

          let tipRecs = '';
          if (data.recommendations && data.recommendations.length > 0) {
            tipRecs = '<br><span style="font-size:0.85rem;color:#27ae60;">推荐：' +
              data.recommendations.map(r => `${r.name} ~${r.price}元`).join('、') +
              '</span>';
          }
          if (tip) { tip.innerHTML = `当前是<strong>${data.meal}</strong>，建议控制在 <strong>${data.suggestion.toFixed(2)} 元</strong>内${tipRecs}`; tip.style.display = 'block'; }
        } else {
          if (dash) dash.style.display = 'none';
          if (tip) tip.style.display = 'none';
        }
      } catch (e) {
        // ignore
      }
    }

    async function loadDashboard() {
      const data = await api('/api/budget');
      document.getElementById('dash-budget').textContent = data.monthly_budget.toFixed(2);
      document.getElementById('dash-spent').textContent = data.month_spent.toFixed(2);
      const rem = document.getElementById('dash-remaining');
      rem.textContent = data.remaining.toFixed(2);
      rem.classList.toggle('warning', data.remaining < data.monthly_budget * 0.2);

      // 今日预算分配
      const allocContainer = document.getElementById('daily-allocation');
      if (data.daily_budget > 0 && data.categories.length) {
        const allocCards = data.categories.map(c => `
          <div class="card">
            <div class="label">${c.name}</div>
            <div class="value">${c.daily_alloc.toFixed(2)}</div>
          </div>
        `).join('');
        allocContainer.innerHTML = `
          <div class="card" style="background:#e8f4fd;">
            <div class="label">日均预算</div>
            <div class="value" style="color:#2980b9;">${data.daily_budget.toFixed(2)}</div>
          </div>
          ${allocCards}
        `;
      }

      const bars = document.getElementById('category-bars');
      if (!data.categories.length) {
        bars.innerHTML = '<p class="empty-msg">暂无分类预算设置</p>';
        return;
      }
      bars.innerHTML = data.categories.map(c => {
        const pct = c.limit > 0 ? Math.min(c.percent, 100) : 0;
        let cls = '';
        if (c.percent >= 100) cls = 'danger';
        else if (c.percent >= 80) cls = 'warning';
        return `
          <div class="progress-item">
            <div class="progress-header">
              <span>${c.name}</span>
              <span>${c.spent.toFixed(2)} / ${c.limit > 0 ? c.limit.toFixed(2) : '未设置'}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${cls}" style="width:${pct}%"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addBatchRow() {
      const container = document.getElementById('batch-items');
      const idx = container.children.length;
      const row = document.createElement('div');
      row.className = 'batch-row';
      row.dataset.index = idx;
      row.innerHTML = `
        <div class="form-group">
          <label>金额（元）</label>
          <input type="number" class="batch-amount" step="0.01" required placeholder="例如：15">
        </div>
        <div class="form-group">
          <label>用途描述</label>
          <input type="text" class="batch-desc" required placeholder="例如：奶茶">
        </div>
        <button type="button" class="btn btn-remove" onclick="removeBatchRow(this)" title="删除">-</button>
      `;
      container.appendChild(row);
    }

    async function removeBatchRow(btn) {
      const container = document.getElementById('batch-items');
      if (container.children.length <= 1) {
        await showAlert('至少保留一项');
        return;
      }
      btn.parentElement.remove();
    }

    async function submitBatchApproval(e) {
      e.preventDefault();
      try {
        const rows = document.querySelectorAll('.batch-row');
        const items = [];
        rows.forEach(row => {
          const amount = parseFloat(row.querySelector('.batch-amount').value);
          const desc = row.querySelector('.batch-desc').value;
          if (!isNaN(amount) && desc.trim()) {
            items.push({ amount, description: desc.trim() });
          }
        });

        if (items.length === 0) {
          await showAlert('请至少填写一项支出');
          return;
        }

        console.log('[submitBatchApproval] items =', JSON.stringify(items));
        const result = await api('/api/approve/batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items })
        });
        console.log('[submitBatchApproval] result =', JSON.stringify(result));

        const box = document.getElementById('approve-result');
        box.className = 'result-box show ' + (result && result.approved ? 'approved' : 'rejected');

        let itemsHtml = '';
        if (result && result.items && result.items.length > 0) {
          itemsHtml = '<br><br>明细：<br>' + result.items.map(i =>
            `&nbsp;&nbsp;${i.description} ${i.amount.toFixed(2)}元 [${i.category}]`
          ).join('<br>');
        }

        const totalStr = result && result.total ? result.total.toFixed(2) : items.reduce((s, i) => s + i.amount, 0).toFixed(2);
        const reasonStr = result && result.reason ? result.reason : '无响应';
        box.innerHTML = `<strong>${result && result.approved ? '批准' : '拒绝'}</strong>（本次合计 ${totalStr} 元）<br>
          理由：${reasonStr}${itemsHtml}`;

        // Reset form to single row
        document.getElementById('batch-items').innerHTML = `
          <div class="batch-row" data-index="0">
            <div class="form-group">
              <label>金额（元）</label>
              <input type="number" class="batch-amount" step="0.01" required placeholder="例如：15">
            </div>
            <div class="form-group">
              <label>用途描述</label>
              <input type="text" class="batch-desc" required placeholder="例如：午饭">
            </div>
          </div>
        `;
      } catch (err) {
        await showAlert('审批失败：' + err.message);
      }
    }

    async function clearRecords() {
      if (!await showConfirm('确定要清空所有记录吗？此操作不可恢复。')) return;
      await api('/api/records', { method: 'DELETE' });
      loadRecords();
      loadDashboard();
    }

    async function deleteSingleRecord(id) {
      if (!await showConfirm('确定删除这条记录吗？')) return;
      await api('/api/records/' + id, { method: 'DELETE' });
      loadRecords();
      loadApprovals();
      loadDashboard();
    }

    async function loadRecords() {
      const data = await api('/api/records');
      const container = document.getElementById('records-table');
      const approvedRecords = data.records.filter(r => r.approved);
      if (!approvedRecords.length) {
        container.innerHTML = '<p class="empty-msg">暂无记录</p>';
        return;
      }
      const rows = approvedRecords.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.amount.toFixed(2)}</td>
          <td>${r.category}</td>
          <td>${r.description}</td>
          <td><button type="button" class="btn btn-remove" onclick="deleteSingleRecord(${r.id})" title="删除">×</button></td>
        </tr>
      `).join('');
      container.innerHTML = `
        <table>
          <thead>
            <tr><th>时间</th><th>金额</th><th>分类</th><th>用途</th><th></th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadApprovals() {
      const data = await api('/api/records');
      const container = document.getElementById('approvals-table');
      if (!data.records.length) {
        container.innerHTML = '<p class="empty-msg">暂无审批记录</p>';
        return;
      }
      const rows = data.records.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.amount.toFixed(2)}</td>
          <td>${r.category}</td>
          <td>${r.description}</td>
          <td class="${r.approved ? 'status-approved' : 'status-rejected'}">${r.approved ? '通过' : '拒绝'}</td>
          <td>${r.reason || '-'}</td>
          <td><button type="button" class="btn btn-remove" onclick="deleteSingleRecord(${r.id})" title="删除">×</button></td>
        </tr>
      `).join('');
      container.innerHTML = `
        <table>
          <thead>
            <tr><th>时间</th><th>金额</th><th>分类</th><th>用途</th><th>状态</th><th>理由</th><th></th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadDailyBill() {
      const data = await api('/api/bill/daily');
      let bill = data.bill;
      if (window.innerWidth <= 600) {
        bill = bill.replace(/={20,}/g, '='.repeat(30));
      }
      document.getElementById('bill-content').textContent = bill;
    }

    async function loadWeeklyBill() {
      const data = await api('/api/bill/weekly');
      let bill = data.bill;
      if (window.innerWidth <= 600) {
        bill = bill.replace(/={20,}/g, '='.repeat(30));
      }
      document.getElementById('bill-content').textContent = bill;
    }

    async function setBudget(e) {
      e.preventDefault();
      try {
        const amount = parseFloat(document.getElementById('set-budget-amount').value);
        console.log('[setBudget] saving amount =', amount);
        const result = await api('/api/budget', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount })
        });
        console.log('[setBudget] result =', result);
        await showAlert('月预算已保存');
        document.getElementById('set-budget-amount').value = '';
      } catch (err) {
        await showAlert('保存失败：' + err.message);
      }
    }

    async function setLimit(e) {
      e.preventDefault();
      const category = document.getElementById('limit-category').value;
      const amount = parseFloat(document.getElementById('limit-amount').value);
      await api('/api/limits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, amount })
      });
      await showAlert(`【${category}】上限已设置为 ${amount.toFixed(2)} 元`);
      document.getElementById('limit-amount').value = '';
    }

    async function loadConfig() {
      const data = await api('/api/config');
      document.getElementById('ai-enabled').checked = data.enabled;
      document.getElementById('ai-model').value = data.model;
      document.getElementById('ai-base-url').value = data.base_url;
      document.getElementById('ai-dietary').value = data.dietary_preferences || '';
      if (data.has_key) {
        document.getElementById('ai-api-key').placeholder = '已保存（输入新值可覆盖）';
      }
    }

    async function saveConfig(e) {
      e.preventDefault();
      const payload = {
        enabled: document.getElementById('ai-enabled').checked,
        model: document.getElementById('ai-model').value,
        base_url: document.getElementById('ai-base-url').value,
        dietary_preferences: document.getElementById('ai-dietary').value.trim(),
      };
      const key = document.getElementById('ai-api-key').value.trim();
      if (key) payload.api_key = key;
      await api('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      await showAlert('AI 配置已保存');
      document.getElementById('ai-api-key').value = '';
      loadConfig();
    }

    async function autoSaveDietary() {
      const value = document.getElementById('ai-dietary').value.trim();
      const hint = document.getElementById('dietary-save-hint');
      await api('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dietary_preferences: value })
      });
      hint.textContent = '已保存';
      hint.style.opacity = '1';
      setTimeout(() => { hint.style.opacity = '0'; }, 1500);
    }

    async function exportDataFile() {
      await exportToJSON();
    }

    async function importDataFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        await importFromJSON(file);
        await showAlert('数据导入成功');
        loadDashboard();
        loadRecords();
        loadConfig();
      } catch (err) {
        await showAlert('导入失败：' + err.message);
      }
      e.target.value = '';
    }

    loadDashboard();
    loadConfig();
    loadMealSuggestion();
    document.getElementById('app-version').textContent = 'v' + APP_VERSION;
  </script>
</body>
</html>
